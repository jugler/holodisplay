[immich]
url = "http://immich.local:2283/api"
api_key = "REEMPLAZA_CON_TU_API_KEY"

[display]
pics_dir = "/home/pi/HoloDisplay/pics"
screen_width = 1920
screen_height = 1080
backend = "pygame"
seconds = 15
grayscale = false
# overlay del ano de la foto
show_year_overlay = true
# overlay superior con personas y/o ubicacion
show_info_overlay = true
# overlay_layout:
# split = nombres arriba izquierda + ano abajo derecha
# mirrored = nombres arriba derecha + ano abajo izquierda
# right = alias legacy de mirrored
overlay_layout = "split"
# opcional: tamanos fijos de fuente para overlays
# year_overlay_font_size = 42
# info_overlay_font_size = 26
# opcional: posicion fija del overlay del ano
# year_overlay_x = 1600
# year_overlay_y = 920
# opcional: posicion fija del overlay de informacion
# info_overlay_x = 20
# info_overlay_y = 80
transition_ms = 700
# orientation = "portrait" # portrait/landscape/any
# rotation_degrees = 270 # use 0, 90, 180, 270

[search]
# modes soportados: person, smart, memories, random
mode = "random"
# si mode = "smart", descomenta y ajusta esta linea:
# smart_query = "beach"
default_people = ["Jesus"]
search_size = 1000
seen_buffer_size = 100

[art]
# api_key = "KEY_DEL_USUARIO_ART"
